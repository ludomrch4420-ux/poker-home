<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PokerHome — Joue avec tes amis</title>

  <!-- Socket.IO sera ajouté à l'étape serveur -->
  <!-- <script src="/socket.io/socket.io.js"></script> -->

<!-- ═══════════════════════════════════════════════
     ÉCRAN 1 : LOBBY
════════════════════════════════════════════════ -->
<div id="screen-lobby">

  <div class="logo">
    <div class="cards-deco">♠ ♥ ♦ ♣</div>
    <h1>PokerHome</h1>
    <p>Texas Hold'em entre amis, en direct</p>
  </div>

  <div class="lobby-box">
    <h2>Rejoindre une partie</h2>

    <div class="field-group">
      <label for="input-name">Ton pseudo</label>
      <input type="text" id="input-name" placeholder="Ex : Thomas" maxlength="20" />
    </div>

    <div class="divider">crée ou rejoins</div>

    <div class="field-group">
      <label for="input-room">Code de salle</label>
      <input type="text" id="input-room" placeholder="Ex : POKER42" maxlength="10"
             style="text-transform: uppercase;" />
    </div>

    <div style="display: flex; gap: 10px;">
      <button class="btn btn-secondary" onclick="createRoom()">Créer une salle</button>
      <button class="btn btn-primary" onclick="joinRoom()">Rejoindre</button>
    </div>
  </div>

</div>


<!-- ═══════════════════════════════════════════════
     ÉCRAN 2 : TABLE DE JEU
════════════════════════════════════════════════ -->
<div id="screen-game">

  <!-- Header -->
  <div class="game-header">
    <div class="room-name" id="header-room-name">Salle POKER42</div>
    <div class="room-meta">
      <span class="badge" id="header-blinds">Blinds 5 / 10</span>
      <span class="badge" id="header-players">0 joueurs</span>
      <span class="badge" id="header-phase">Attente</span>
    </div>
    <button class="btn btn-secondary" style="width:auto; padding:6px 14px; font-size:13px;"
            onclick="leaveGame()">Quitter</button>
  </div>

  <!-- Corps -->
  <div class="game-body">

    <!-- Zone table -->
    <div class="table-zone">
      <div class="poker-table" id="poker-table">

        <!-- Feutrine -->
        <div class="table-felt">

          <!-- Pot -->
          <div class="pot">
            <div class="pot-label">Pot</div>
            <div class="pot-amount" id="pot-display">0 jetons</div>
          </div>

          <!-- Cartes communes -->
          <div class="community-cards" id="community-cards">
            <div class="card empty" id="cc-0"></div>
            <div class="card empty" id="cc-1"></div>
            <div class="card empty" id="cc-2"></div>
            <div class="card empty" id="cc-3"></div>
            <div class="card empty" id="cc-4"></div>
          </div>

        </div>

        <!-- Sièges (générés par JS) -->
        <div id="seats-container"></div>

      </div>
    </div>

    <!-- Panneau latéral -->
    <div class="side-panel">

      <div class="panel-section">
        <div class="panel-title">Ta main</div>
        <div class="hand-strength" id="hand-strength">—</div>
      </div>

      <div class="panel-section">
        <div class="panel-title">Actions</div>
        <div id="log"></div>
      </div>

    </div>

  </div>

  <!-- Barre d'actions -->
  <div class="action-bar">

    <div class="action-status">
      <div class="turn-label" id="turn-label">En attente du début de la partie…</div>
      <div class="turn-sub" id="turn-sub"></div>
      <div class="timer-bar">
        <div class="timer-fill" id="timer-fill" style="width: 100%;"></div>
      </div>
    </div>

    <div class="action-buttons" id="action-buttons">
      <button class="btn btn-danger" onclick="playerAction('fold')">Se coucher</button>
      <button class="btn btn-success" onclick="playerAction('check')">Checker</button>
      <button class="btn btn-success" onclick="playerAction('call')" id="btn-call">Suivre</button>
      <div class="raise-group">
        <input type="number" id="raise-amount" value="20" min="0" step="10" />
        <button class="btn btn-gold" onclick="playerAction('raise')">Relancer</button>
      </div>
    </div>

  </div>

</div>

<!-- Toast -->
<div id="toast"></div>


<!-- ═══════════════════════════════════════════════
     JAVASCRIPT — Logique client de base
════════════════════════════════════════════════ -->
<script>

  /* ══════════════════════════════════════════
     État local (sera remplacé par Socket.IO)
  ══════════════════════════════════════════ */
  const state = {
    playerName: '',
    roomCode: '',
    phase: 'lobby',   // lobby | waiting | preflop | flop | turn | river | showdown
    pot: 0,
    myCards: [],
    communityCards: [],
    players: [],
    myTurn: false,
    currentBet: 0,
    myStack: 1000,
  };

  /* ══════════════════════════════════════════
     Navigation entre écrans
  ══════════════════════════════════════════ */
  function showScreen(name) {
    document.getElementById('screen-lobby').style.display = name === 'lobby' ? 'flex' : 'none';
    document.getElementById('screen-game').style.display  = name === 'game'  ? 'flex' : 'none';
  }

  /* ══════════════════════════════════════════
     Lobby — Créer / Rejoindre
  ══════════════════════════════════════════ */
  function createRoom() {
    const name = document.getElementById('input-name').value.trim();
    if (!name) return showToast('Entre ton pseudo d\'abord.');

    // Génère un code aléatoire 6 car
    const code = Math.random().toString(36).substring(2, 8).toUpperCase();
    document.getElementById('input-room').value = code;

    state.playerName = name;
    state.roomCode   = code;

    // TODO : émettre socket.emit('createRoom', { name, code })
    enterGame();
  }

  function joinRoom() {
    const name = document.getElementById('input-name').value.trim();
    const room = document.getElementById('input-room').value.trim().toUpperCase();
    if (!name) return showToast('Entre ton pseudo.');
    if (!room) return showToast('Entre le code de salle.');

    state.playerName = name;
    state.roomCode   = room;

    // TODO : socket.emit('joinRoom', { name, room })
    enterGame();
  }

  function enterGame() {
    document.getElementById('header-room-name').textContent = 'Salle ' + state.roomCode;
    showScreen('game');
    showToast('Bienvenue ' + state.playerName + ' !');

    // Demo locale : populate quelques joueurs fictifs
    demoPopulate();
  }

  function leaveGame() {
    // TODO : socket.emit('leaveRoom')
    showScreen('lobby');
  }

  /* ══════════════════════════════════════════
     Actions du joueur
  ══════════════════════════════════════════ */
  function playerAction(type) {
    if (!state.myTurn) return;

    const amount = parseInt(document.getElementById('raise-amount').value) || 0;

    const labels = {
      fold:  'Tu t\'es couché',
      check: 'Tu as checké',
      call:  'Tu as suivi ' + state.currentBet,
      raise: 'Tu as relancé à ' + amount,
    };

    addLog(state.playerName, type, amount);
    showToast(labels[type]);

    // TODO : socket.emit('playerAction', { type, amount })
    state.myTurn = false;
    updateTurnUI(false, '');
  }

  /* ══════════════════════════════════════════
     Affichage des cartes
  ══════════════════════════════════════════ */
  const SUITS_COLOR = { '♥': 'red', '♦': 'red', '♠': 'black', '♣': 'black' };

  function renderCard(el, rank, suit) {
    el.className = 'card ' + (SUITS_COLOR[suit] || 'black');
    el.innerHTML = '<span class="rank">' + rank + '</span><span class="suit">' + suit + '</span>';
  }

  function renderCommunityCards(cards) {
    for (let i = 0; i < 5; i++) {
      const el = document.getElementById('cc-' + i);
      if (cards[i]) {
        renderCard(el, cards[i].rank, cards[i].suit);
      } else {
        el.className = 'card empty';
        el.innerHTML = '';
      }
    }
  }

  /* ══════════════════════════════════════════
     Sièges joueurs
  ══════════════════════════════════════════ */
  const SEAT_POSITIONS = ['bottom', 'top-left', 'top-right', 'left', 'right'];

  function renderSeats(players) {
    const container = document.getElementById('seats-container');
    container.innerHTML = '';

    players.forEach((p, i) => {
      const pos  = SEAT_POSITIONS[i] || 'bottom';
      const seat = document.createElement('div');
      seat.className = 'seat';
      seat.dataset.pos = pos;

      const initials = p.name.substring(0, 2).toUpperCase();
      const avatarClass = ['avatar', p.isTurn ? 'is-turn' : '', p.folded ? 'folded' : ''].join(' ');

      const dealerBtn = p.isDealer ? '<div class="dealer-chip">D</div>' : '';

      const cardsHTML = p.isMe
        ? p.cards.map(c => `<div class="card ${SUITS_COLOR[c.suit] || 'black'}">
              <span class="rank">${c.rank}</span>
              <span class="suit">${c.suit}</span>
            </div>`).join('')
        : (p.cards.length > 0
            ? '<div class="card hidden"></div><div class="card hidden"></div>'
            : '');

      const betHTML = p.bet > 0
        ? `<div class="seat-bet">${p.bet}</div>`
        : '';

      seat.innerHTML = `
        ${p.isMe && cardsHTML ? `<div class="seat-cards">${cardsHTML}</div>` : ''}
        <div class="${avatarClass}">${initials}${dealerBtn}</div>
        <div class="seat-name">${p.name}${p.isMe ? ' (toi)' : ''}</div>
        <div class="seat-stack">${p.stack} jetons</div>
        ${betHTML}
        ${!p.isMe && cardsHTML ? `<div class="seat-cards">${cardsHTML}</div>` : ''}
      `;

      container.appendChild(seat);
    });
  }

  /* ══════════════════════════════════════════
     Journal d'actions
  ══════════════════════════════════════════ */
  function addLog(player, action, amount) {
    const log   = document.getElementById('log');
    const line  = document.createElement('div');
    line.className = 'log-line';

    const actionText = {
      fold:  '<span class="log-action-fold">se couche</span>',
      check: 'checke',
      call:  'suit ' + amount,
      raise: '<span class="log-action-raise">relance à ' + amount + '</span>',
    }[action] || action;

    line.innerHTML = `<span class="log-player">${player}</span> ${actionText}`;
    log.prepend(line);

    if (log.children.length > 20) log.lastChild.remove();
  }

  /* ══════════════════════════════════════════
     Tour du joueur
  ══════════════════════════════════════════ */
  function updateTurnUI(isMyTurn, sub) {
    state.myTurn = isMyTurn;
    document.getElementById('turn-label').textContent = isMyTurn
      ? 'C\'est ton tour !'
      : 'En attente…';
    document.getElementById('turn-sub').textContent = sub || '';
    document.getElementById('action-buttons').style.opacity = isMyTurn ? '1' : '0.4';
    document.getElementById('action-buttons').style.pointerEvents = isMyTurn ? 'auto' : 'none';

    // Timer visuel
    const fill = document.getElementById('timer-fill');
    if (isMyTurn) {
      fill.style.transition = 'none';
      fill.style.width = '100%';
      setTimeout(() => {
        fill.style.transition = 'width 20s linear';
        fill.style.width = '0%';
      }, 50);
    } else {
      fill.style.width = '100%';
    }
  }

  /* ══════════════════════════════════════════
     Toast
  ══════════════════════════════════════════ */
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  }

  /* ══════════════════════════════════════════
     DÉMO — données fictives pour voir la table
     (sera remplacé par les événements Socket.IO)
  ══════════════════════════════════════════ */
  function demoPopulate() {
    state.players = [
      { name: 'Thomas', isMe: true,  isDealer: true,  isTurn: true,  folded: false, stack: 1450, bet: 40,  cards: [{rank:'K',suit:'♣'},{rank:'K',suit:'♥'}] },
      { name: 'Marie-L.',  isMe: false, isDealer: false, isTurn: false, folded: false, stack: 980,  bet: 0,   cards: [{rank:'?',suit:'?'},{rank:'?',suit:'?'}] },
      { name: 'Jean-B.',   isMe: false, isDealer: false, isTurn: false, folded: false, stack: 2100, bet: 80,  cards: [{rank:'?',suit:'?'},{rank:'?',suit:'?'}] },
      { name: 'Sara',      isMe: false, isDealer: false, isTurn: false, folded: true,  stack: 620,  bet: 0,   cards: [] },
      { name: 'Pierre',    isMe: false, isDealer: false, isTurn: false, folded: false, stack: 1750, bet: 40,  cards: [{rank:'?',suit:'?'},{rank:'?',suit:'?'}] },
    ];

    state.communityCards = [
      { rank: 'A', suit: '♥' },
      { rank: 'K', suit: '♠' },
      { rank: '7', suit: '♦' },
    ];

    state.pot = 240;

    document.getElementById('pot-display').textContent = state.pot + ' jetons';
    document.getElementById('header-players').textContent = state.players.length + ' joueurs';
    document.getElementById('header-phase').textContent = 'Flop';
    document.getElementById('hand-strength').textContent = 'Brelan de Rois';

    renderCommunityCards(state.communityCards);
    renderSeats(state.players);

    addLog('Jean-B.', 'raise', 80);
    addLog('Pierre', 'call', 40);
    addLog('Sara', 'fold', 0);

    state.currentBet = 80;
    document.getElementById('raise-amount').value = 160;
    document.getElementById('btn-call').textContent = 'Suivre 80';
    updateTurnUI(true, 'Jean-Baptiste a relancé à 80');
  }

  /* ══════════════════════════════════════════
     TODO : Socket.IO (Étape 3)
  ══════════════════════════════════════════

  const socket = io();

  socket.on('connect', () => console.log('Connecté au serveur'));

  socket.on('roomJoined', ({ room, players }) => {
    state.players = players;
    renderSeats(players);
  });

  socket.on('gameState', (gs) => {
    state.pot            = gs.pot;
    state.communityCards = gs.communityCards;
    state.phase          = gs.phase;
    renderCommunityCards(gs.communityCards);
    renderSeats(gs.players);
    document.getElementById('pot-display').textContent = gs.pot + ' jetons';
    document.getElementById('header-phase').textContent = gs.phase;
  });

  socket.on('yourTurn', ({ currentBet }) => {
    state.currentBet = currentBet;
    document.getElementById('btn-call').textContent = 'Suivre ' + currentBet;
    document.getElementById('raise-amount').value   = currentBet * 2;
    updateTurnUI(true, 'À toi de jouer !');
  });

  socket.on('actionLog', ({ player, action, amount }) => {
    addLog(player, action, amount);
  });

  ══════════════════════════════════════════ */

</script>
</body>
</html>
