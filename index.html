<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PokerHome — Joue avec tes amis</title>

  <!-- Socket.IO sera ajouté à l'étape serveur -->
  <!-- <script src="/socket.io/socket.io.js"></script> -->

  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --felt:        #1d6b3e;
      --felt-dark:   #155230;
      --rail:        #6b3a1f;
      --rail-light:  #8B5A2B;
      --gold:        #e2c97e;
      --gold-dim:    rgba(226, 201, 126, 0.25);
      --bg:          #0f0f1a;
      --surface:     #1a1a2e;
      --surface-2:   rgba(255,255,255,0.06);
      --text:        #f0ece0;
      --text-muted:  rgba(240,236,224,0.45);
      --red:         #c0392b;
      --green:       #27ae60;
      --blue:        #2980b9;
      --radius-sm:   6px;
      --radius-md:   10px;
      --radius-lg:   16px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
    }

    /* ── Lobby (écran d'accueil) ── */
    #screen-lobby {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 24px;
    }

    .logo {
      text-align: center;
    }

    .logo h1 {
      font-size: 42px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: -1px;
    }

    .logo p {
      color: var(--text-muted);
      font-size: 15px;
      margin-top: 6px;
    }

    .cards-deco {
      font-size: 36px;
      letter-spacing: 4px;
    }

    .lobby-box {
      background: var(--surface);
      border: 0.5px solid rgba(226, 201, 126, 0.2);
      border-radius: var(--radius-lg);
      padding: 32px;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .lobby-box h2 {
      font-size: 17px;
      font-weight: 600;
      color: var(--gold);
      margin-bottom: 4px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    input[type="text"],
    input[type="number"] {
      background: rgba(255,255,255,0.07);
      border: 0.5px solid rgba(255,255,255,0.18);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 15px;
      padding: 10px 14px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: var(--gold);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 0.5px;
      background: rgba(255,255,255,0.12);
    }

    /* ── Boutons ── */
    .btn {
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      padding: 11px 20px;
      transition: all 0.15s;
      width: 100%;
    }

    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: var(--gold);
      color: #1a1a2e;
    }

    .btn-primary:hover { background: #f0d98e; }

    .btn-secondary {
      background: var(--surface-2);
      color: var(--text);
      border: 0.5px solid rgba(255,255,255,0.15);
    }

    .btn-secondary:hover { background: rgba(255,255,255,0.1); }

    .btn-danger {
      background: rgba(192,57,43,0.2);
      color: #e74c3c;
      border: 0.5px solid rgba(192,57,43,0.35);
    }

    .btn-success {
      background: rgba(39,174,96,0.2);
      color: #52be80;
      border: 0.5px solid rgba(39,174,96,0.35);
    }

    .btn-gold {
      background: rgba(226,201,126,0.15);
      color: var(--gold);
      border: 0.5px solid rgba(226,201,126,0.35);
    }

    /* ── Table de jeu (écran principal) ── */
    #screen-game {
      display: none;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Header */
    .game-header {
      background: var(--surface);
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .game-header .room-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--gold);
    }

    .game-header .room-meta {
      display: flex;
      gap: 10px;
    }

    .badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--gold-dim);
      color: var(--gold);
      border: 0.5px solid rgba(226,201,126,0.25);
    }

    /* Corps du jeu */
    .game-body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Zone table */
    .table-zone {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    /* Table ovale */
    .poker-table {
      position: relative;
      width: min(600px, 100%);
      aspect-ratio: 2 / 1;
    }

    .table-felt {
      width: 100%;
      height: 100%;
      background: var(--felt);
      border-radius: 50%;
      border: 8px solid var(--rail-light);
      outline: 12px solid var(--rail);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
    }

    .table-felt::after {
      content: '';
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.08);
      pointer-events: none;
    }

    /* Pot */
    .pot {
      text-align: center;
    }

    .pot-label {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .pot-amount {
      font-size: 24px;
      font-weight: 700;
      color: var(--gold);
    }

    /* Cartes communes */
    .community-cards {
      display: flex;
      gap: 6px;
    }

    /* ── Cartes ── */
    .card {
      width: 40px;
      height: 58px;
      border-radius: 4px;
      background: white;
      border: 0.5px solid #ccc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      line-height: 1.1;
      user-select: none;
      transition: transform 0.15s;
    }

    .card:hover { transform: translateY(-4px); }

    .card .suit { font-size: 12px; }
    .card.red { color: var(--red); }
    .card.black { color: #1a1a1a; }

    .card.hidden {
      background: #16437e;
      border-color: #1e5799;
      color: transparent;
      font-size: 0;
    }

    .card.hidden::after {
      content: '🂠';
      font-size: 30px;
      color: rgba(255,255,255,0.12);
    }

    .card.empty {
      background: rgba(255,255,255,0.06);
      border: 1.5px dashed rgba(255,255,255,0.15);
    }

    /* ── Sièges joueurs ── */
    .seat {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transform: translate(-50%, -50%);
    }

    /* Positions (% par rapport au centre de la table) */
    .seat[data-pos="bottom"] { bottom: -80px; left: 50%; transform: translateX(-50%); }
    .seat[data-pos="top-left"] { top: -60px; left: 25%; transform: translateX(-50%); }
    .seat[data-pos="top-right"] { top: -60px; right: 25%; transform: translateX(50%); }
    .seat[data-pos="left"] { top: 50%; left: -80px; transform: translateY(-50%); }
    .seat[data-pos="right"] { top: 50%; right: -80px; transform: translateY(50%); }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: #2d3561;
      border: 2px solid rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: white;
      position: relative;
    }

    .avatar.is-turn {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(226,201,126,0.2);
    }

    .avatar.folded { opacity: 0.35; }

    .dealer-chip {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--gold);
      color: #1a1a2e;
      font-size: 8px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .seat-name { font-size: 11px; color: rgba(255,255,255,0.75); white-space: nowrap; }
    .seat-stack { font-size: 12px; color: var(--gold); font-weight: 600; }
    .seat-bet { font-size: 11px; color: #a8e6cf; background: rgba(0,0,0,0.4); padding: 2px 8px; border-radius: 12px; }

    .seat-cards {
      display: flex;
      gap: 3px;
    }

    .seat-cards .card {
      width: 24px;
      height: 34px;
      font-size: 10px;
      border-radius: 3px;
    }

    .seat-cards .card .suit { font-size: 9px; }

    /* ── Panneau latéral ── */
    .side-panel {
      width: 200px;
      background: var(--surface);
      border-left: 0.5px solid rgba(255,255,255,0.07);
      display: flex;
      flex-direction: column;
      gap: 0;
      flex-shrink: 0;
      overflow-y: auto;
    }

    .panel-section {
      padding: 14px 14px;
      border-bottom: 0.5px solid rgba(255,255,255,0.06);
    }

    .panel-title {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    /* Main du joueur */
    .hand-strength {
      font-size: 13px;
      font-weight: 600;
      color: #a8e6cf;
    }

    /* Journal */
    #log {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .log-line {
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      padding: 2px 0;
      border-bottom: 0.5px solid rgba(255,255,255,0.04);
    }

    .log-line .log-player { color: var(--gold); }
    .log-line .log-action-fold { color: #e74c3c; }
    .log-line .log-action-raise { color: #a8e6cf; }

    /* ── Barre d'actions ── */
    .action-bar {
      background: var(--surface);
      border-top: 0.5px solid rgba(255,255,255,0.08);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .action-status {
      flex: 1;
      min-width: 180px;
    }

    .action-status .turn-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--gold);
    }

    .action-status .turn-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Timer */
    .timer-bar {
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }

    .timer-fill {
      height: 100%;
      background: var(--gold);
      border-radius: 2px;
      transition: width 1s linear;
    }

    .action-buttons {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .action-buttons .btn {
      width: auto;
      padding: 9px 16px;
      font-size: 13px;
    }

    .raise-group {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .raise-group input {
      width: 90px;
      padding: 8px 10px;
      font-size: 13px;
    }

    /* ── Utilitaires ── */
    .hidden { display: none !important; }

    /* ── Toast / message ── */
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(226,201,126,0.15);
      border: 0.5px solid rgba(226,201,126,0.4);
      color: var(--gold);
      font-size: 13px;
      padding: 10px 20px;
      border-radius: 20px;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Responsive ── */
    @media (max-width: 680px) {
      .side-panel { display: none; }
      .poker-table { width: 95vw; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════
     ÉCRAN 1 : LOBBY
════════════════════════════════════════════════ -->
<div id="screen-lobby">

  <div class="logo">
    <div class="cards-deco">♠ ♥ ♦ ♣</div>
    <h1>PokerHome</h1>
    <p>Texas Hold'em entre amis, en direct</p>
  </div>

  <div class="lobby-box">
    <h2>Rejoindre une partie</h2>

    <div class="field-group">
      <label for="input-name">Ton pseudo</label>
      <input type="text" id="input-name" placeholder="Ex : Thomas" maxlength="20" />
    </div>

    <div class="divider">crée ou rejoins</div>

    <div class="field-group">
      <label for="input-room">Code de salle</label>
      <input type="text" id="input-room" placeholder="Ex : POKER42" maxlength="10"
             style="text-transform: uppercase;" />
    </div>

    <div style="display: flex; gap: 10px;">
      <button class="btn btn-secondary" onclick="createRoom()">Créer une salle</button>
      <button class="btn btn-primary" onclick="joinRoom()">Rejoindre</button>
    </div>
  </div>

</div>


<!-- ═══════════════════════════════════════════════
     ÉCRAN 2 : TABLE DE JEU
════════════════════════════════════════════════ -->
<div id="screen-game">

  <!-- Header -->
  <div class="game-header">
    <div class="room-name" id="header-room-name">Salle POKER42</div>
    <div class="room-meta">
      <span class="badge" id="header-blinds">Blinds 5 / 10</span>
      <span class="badge" id="header-players">0 joueurs</span>
      <span class="badge" id="header-phase">Attente</span>
    </div>
    <button class="btn btn-secondary" style="width:auto; padding:6px 14px; font-size:13px;"
            onclick="leaveGame()">Quitter</button>
  </div>

  <!-- Corps -->
  <div class="game-body">

    <!-- Zone table -->
    <div class="table-zone">
      <div class="poker-table" id="poker-table">

        <!-- Feutrine -->
        <div class="table-felt">

          <!-- Pot -->
          <div class="pot">
            <div class="pot-label">Pot</div>
            <div class="pot-amount" id="pot-display">0 jetons</div>
          </div>

          <!-- Cartes communes -->
          <div class="community-cards" id="community-cards">
            <div class="card empty" id="cc-0"></div>
            <div class="card empty" id="cc-1"></div>
            <div class="card empty" id="cc-2"></div>
            <div class="card empty" id="cc-3"></div>
            <div class="card empty" id="cc-4"></div>
          </div>

        </div>

        <!-- Sièges (générés par JS) -->
        <div id="seats-container"></div>

      </div>
    </div>

    <!-- Panneau latéral -->
    <div class="side-panel">

      <div class="panel-section">
        <div class="panel-title">Ta main</div>
        <div class="hand-strength" id="hand-strength">—</div>
      </div>

      <div class="panel-section">
        <div class="panel-title">Actions</div>
        <div id="log"></div>
      </div>

    </div>

  </div>

  <!-- Barre d'actions -->
  <div class="action-bar">

    <div class="action-status">
      <div class="turn-label" id="turn-label">En attente du début de la partie…</div>
      <div class="turn-sub" id="turn-sub"></div>
      <div class="timer-bar">
        <div class="timer-fill" id="timer-fill" style="width: 100%;"></div>
      </div>
    </div>

    <div class="action-buttons" id="action-buttons">
      <button class="btn btn-danger" onclick="playerAction('fold')">Se coucher</button>
      <button class="btn btn-success" onclick="playerAction('check')">Checker</button>
      <button class="btn btn-success" onclick="playerAction('call')" id="btn-call">Suivre</button>
      <div class="raise-group">
        <input type="number" id="raise-amount" value="20" min="0" step="10" />
        <button class="btn btn-gold" onclick="playerAction('raise')">Relancer</button>
      </div>
    </div>

  </div>

</div>

<!-- Toast -->
<div id="toast"></div>


<!-- ═══════════════════════════════════════════════
     JAVASCRIPT — Logique client de base
════════════════════════════════════════════════ -->
<script>

  /* ══════════════════════════════════════════
     État local (sera remplacé par Socket.IO)
  ══════════════════════════════════════════ */
  const state = {
    playerName: '',
    roomCode: '',
    phase: 'lobby',   // lobby | waiting | preflop | flop | turn | river | showdown
    pot: 0,
    myCards: [],
    communityCards: [],
    players: [],
    myTurn: false,
    currentBet: 0,
    myStack: 1000,
  };

  /* ══════════════════════════════════════════
     Navigation entre écrans
  ══════════════════════════════════════════ */
  function showScreen(name) {
    document.getElementById('screen-lobby').style.display = name === 'lobby' ? 'flex' : 'none';
    document.getElementById('screen-game').style.display  = name === 'game'  ? 'flex' : 'none';
  }

  /* ══════════════════════════════════════════
     Lobby — Créer / Rejoindre
  ══════════════════════════════════════════ */
  function createRoom() {
    const name = document.getElementById('input-name').value.trim();
    if (!name) return showToast('Entre ton pseudo d\'abord.');

    // Génère un code aléatoire 6 car
    const code = Math.random().toString(36).substring(2, 8).toUpperCase();
    document.getElementById('input-room').value = code;

    state.playerName = name;
    state.roomCode   = code;

    // TODO : émettre socket.emit('createRoom', { name, code })
    enterGame();
  }

  function joinRoom() {
    const name = document.getElementById('input-name').value.trim();
    const room = document.getElementById('input-room').value.trim().toUpperCase();
    if (!name) return showToast('Entre ton pseudo.');
    if (!room) return showToast('Entre le code de salle.');

    state.playerName = name;
    state.roomCode   = room;

    // TODO : socket.emit('joinRoom', { name, room })
    enterGame();
  }

  function enterGame() {
    document.getElementById('header-room-name').textContent = 'Salle ' + state.roomCode;
    showScreen('game');
    showToast('Bienvenue ' + state.playerName + ' !');

    // Demo locale : populate quelques joueurs fictifs
    demoPopulate();
  }

  function leaveGame() {
    // TODO : socket.emit('leaveRoom')
    showScreen('lobby');
  }

  /* ══════════════════════════════════════════
     Actions du joueur
  ══════════════════════════════════════════ */
  function playerAction(type) {
    if (!state.myTurn) return;

    const amount = parseInt(document.getElementById('raise-amount').value) || 0;

    const labels = {
      fold:  'Tu t\'es couché',
      check: 'Tu as checké',
      call:  'Tu as suivi ' + state.currentBet,
      raise: 'Tu as relancé à ' + amount,
    };

    addLog(state.playerName, type, amount);
    showToast(labels[type]);

    // TODO : socket.emit('playerAction', { type, amount })
    state.myTurn = false;
    updateTurnUI(false, '');
  }

  /* ══════════════════════════════════════════
     Affichage des cartes
  ══════════════════════════════════════════ */
  const SUITS_COLOR = { '♥': 'red', '♦': 'red', '♠': 'black', '♣': 'black' };

  function renderCard(el, rank, suit) {
    el.className = 'card ' + (SUITS_COLOR[suit] || 'black');
    el.innerHTML = '<span class="rank">' + rank + '</span><span class="suit">' + suit + '</span>';
  }

  function renderCommunityCards(cards) {
    for (let i = 0; i < 5; i++) {
      const el = document.getElementById('cc-' + i);
      if (cards[i]) {
        renderCard(el, cards[i].rank, cards[i].suit);
      } else {
        el.className = 'card empty';
        el.innerHTML = '';
      }
    }
  }

  /* ══════════════════════════════════════════
     Sièges joueurs
  ══════════════════════════════════════════ */
  const SEAT_POSITIONS = ['bottom', 'top-left', 'top-right', 'left', 'right'];

  function renderSeats(players) {
    const container = document.getElementById('seats-container');
    container.innerHTML = '';

    players.forEach((p, i) => {
      const pos  = SEAT_POSITIONS[i] || 'bottom';
      const seat = document.createElement('div');
      seat.className = 'seat';
      seat.dataset.pos = pos;

      const initials = p.name.substring(0, 2).toUpperCase();
      const avatarClass = ['avatar', p.isTurn ? 'is-turn' : '', p.folded ? 'folded' : ''].join(' ');

      const dealerBtn = p.isDealer ? '<div class="dealer-chip">D</div>' : '';

      const cardsHTML = p.isMe
        ? p.cards.map(c => `<div class="card ${SUITS_COLOR[c.suit] || 'black'}">
              <span class="rank">${c.rank}</span>
              <span class="suit">${c.suit}</span>
            </div>`).join('')
        : (p.cards.length > 0
            ? '<div class="card hidden"></div><div class="card hidden"></div>'
            : '');

      const betHTML = p.bet > 0
        ? `<div class="seat-bet">${p.bet}</div>`
        : '';

      seat.innerHTML = `
        ${p.isMe && cardsHTML ? `<div class="seat-cards">${cardsHTML}</div>` : ''}
        <div class="${avatarClass}">${initials}${dealerBtn}</div>
        <div class="seat-name">${p.name}${p.isMe ? ' (toi)' : ''}</div>
        <div class="seat-stack">${p.stack} jetons</div>
        ${betHTML}
        ${!p.isMe && cardsHTML ? `<div class="seat-cards">${cardsHTML}</div>` : ''}
      `;

      container.appendChild(seat);
    });
  }

  /* ══════════════════════════════════════════
     Journal d'actions
  ══════════════════════════════════════════ */
  function addLog(player, action, amount) {
    const log   = document.getElementById('log');
    const line  = document.createElement('div');
    line.className = 'log-line';

    const actionText = {
      fold:  '<span class="log-action-fold">se couche</span>',
      check: 'checke',
      call:  'suit ' + amount,
      raise: '<span class="log-action-raise">relance à ' + amount + '</span>',
    }[action] || action;

    line.innerHTML = `<span class="log-player">${player}</span> ${actionText}`;
    log.prepend(line);

    if (log.children.length > 20) log.lastChild.remove();
  }

  /* ══════════════════════════════════════════
     Tour du joueur
  ══════════════════════════════════════════ */
  function updateTurnUI(isMyTurn, sub) {
    state.myTurn = isMyTurn;
    document.getElementById('turn-label').textContent = isMyTurn
      ? 'C\'est ton tour !'
      : 'En attente…';
    document.getElementById('turn-sub').textContent = sub || '';
    document.getElementById('action-buttons').style.opacity = isMyTurn ? '1' : '0.4';
    document.getElementById('action-buttons').style.pointerEvents = isMyTurn ? 'auto' : 'none';

    // Timer visuel
    const fill = document.getElementById('timer-fill');
    if (isMyTurn) {
      fill.style.transition = 'none';
      fill.style.width = '100%';
      setTimeout(() => {
        fill.style.transition = 'width 20s linear';
        fill.style.width = '0%';
      }, 50);
    } else {
      fill.style.width = '100%';
    }
  }

  /* ══════════════════════════════════════════
     Toast
  ══════════════════════════════════════════ */
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  }
